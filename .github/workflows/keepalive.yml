# 讓 Render 免費方案的 demo 站保持醒著(15 分鐘閒置會休眠,冷啟動 30-60 秒會嚇跑試玩的人)。
# 搭配 docs/index.html 的載入預熱;Render 免費 750 instance-hours/月,單一服務 24/7 約 720 小時,夠用。
name: keepalive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping demo /api/health
        run: |
          curl -sS -m 60 -o /dev/null -w "demo %{http_code} in %{time_total}s\n" \
            https://mori-canvas.onrender.com/api/health || echo "ping failed (non-fatal)"
