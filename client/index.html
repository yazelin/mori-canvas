<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>共筆白板</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--paper: #f1ece1;
				--ink: #1c1a17;
				--ink-soft: #6b655c;
				--line: rgba(28, 26, 23, 0.1);
				--accent: #b4530a; /* deep amber — warm, distinct from the card hues */
				--accent-soft: #f6e6d3;
				--live: #e11d48;
				--glass: rgba(252, 250, 245, 0.7);
				--shadow: 0 10px 30px -12px rgba(28, 26, 23, 0.3), 0 3px 8px -3px rgba(28, 26, 23, 0.12);
				--ui: 'Hanken Grotesk', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
				--display: 'Fraunces', 'Noto Sans TC', serif;
			}
			* { box-sizing: border-box; }
			html, body, #root { margin: 0; height: 100%; }
			body {
				font-family: var(--ui);
				color: var(--ink);
				-webkit-font-smoothing: antialiased;
				text-rendering: optimizeLegibility;
			}
			/* warm paper canvas with a faint dot grid for depth */
			.board-bg {
				background-color: var(--paper);
				background-image: radial-gradient(rgba(28, 26, 23, 0.055) 1.1px, transparent 1.1px);
				background-size: 24px 24px;
				background-position: -1px -1px;
			}
			.glass {
				background: var(--glass);
				backdrop-filter: blur(16px) saturate(1.3);
				-webkit-backdrop-filter: blur(16px) saturate(1.3);
				border: 1px solid rgba(255, 255, 255, 0.65);
				box-shadow: var(--shadow);
				border-radius: 16px;
			}
			.btn {
				font-family: var(--ui);
				font-size: 13px;
				font-weight: 500;
				color: var(--ink);
				background: rgba(255, 255, 255, 0.5);
				border: 1px solid var(--line);
				border-radius: 10px;
				padding: 6px 11px;
				cursor: pointer;
				transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
				white-space: nowrap;
				-webkit-tap-highlight-color: transparent;
			}
			.btn:hover { background: #fff; border-color: rgba(28, 26, 23, 0.18); }
			.btn:active { transform: translateY(1px) scale(0.98); }
			.btn:disabled { opacity: 0.4; cursor: default; }
			.btn-primary { background: var(--ink); color: #f7f3ea; border-color: var(--ink); }
			.btn-primary:hover { background: #000; }
			.btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
			.btn-accent:hover { background: #97450a; }
			.btn-on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
			.btn-live { background: var(--live); color: #fff; border-color: var(--live); animation: livePulse 1.6s ease-in-out infinite; }
			@keyframes livePulse {
				0%, 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.45); }
				50% { box-shadow: 0 0 0 9px rgba(225, 29, 72, 0); }
			}
			@keyframes fadeScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: none; } }
			@keyframes floatIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
			.float-in { animation: floatIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
			.modal-in { animation: fadeScale 0.22s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
			.code { font-family: var(--display); font-weight: 600; letter-spacing: 0.04em; }
			input, textarea { font-family: var(--ui); }
			input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 0; border-color: transparent; }
			/* the app uses inline styles, so style bare <button> for a cohesive modern look */
			button {
				font-family: var(--ui);
				font-weight: 500;
				font-size: 13px;
				color: var(--ink);
				background: rgba(255, 255, 255, 0.55);
				border: 1px solid var(--line);
				border-radius: 10px;
				padding: 6px 11px;
				cursor: pointer;
				white-space: nowrap;
				-webkit-tap-highlight-color: transparent;
				transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
			}
			button:hover { background: #fff; border-color: rgba(28, 26, 23, 0.18); box-shadow: 0 2px 10px -4px rgba(28, 26, 23, 0.25); }
			button:active { transform: translateY(1px) scale(0.98); }
			button:disabled { opacity: 0.4; cursor: default; box-shadow: none; }
			.live { animation: livePulse 1.6s ease-in-out infinite; }
			@media (max-width: 700px) { button { padding: 9px 13px; font-size: 14px; } }
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
