# Render Blueprint — connect this GitHub repo on render.com and it reads this file.
# (Or create a Web Service manually: runtime = Docker, it auto-detects the Dockerfile.)
services:
  - type: web
    name: mori-canvas
    runtime: docker
    plan: free            # free spins down after ~15 min idle (cold start on next visit)
    region: singapore     # closest Render region to Taiwan
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # REQUIRED — your Groq API key (set the value in the Render dashboard, not in git)
      - key: GROQ_API_KEY
        sync: false
      # REQUIRED — locks host-level settings (whisperUrl / mode / local-only / host Groq key)
      # and "end room"; changing them needs a matching X-Admin-Token header. Use a long
      # random string; set the value in the Render dashboard, not in git.
      - key: ADMIN_TOKEN
        sync: false
      # demo guard: max AI/STT requests PER IP per minute (each visitor has their own quota;
      # only people sharing one public IP/wifi share it). Tune anytime in the dashboard.
      # The real money-guard is a spending cap on your Groq account.
      - key: DEMO_RATE_PER_MIN
        value: "60"
      # demo guard: global cap on shared-key Groq LLM calls PER DAY (UTC midnight reset).
      # When hit, the shared key stops and visitors get a friendly "trial quota used up —
      # bring your own free Groq key or self-host" message. Visitors who bring their OWN key
      # are NEVER capped. ~100/day keeps the worst-case bill under ~NT$300/month on its own;
      # pair with a spending limit on your Groq account as the hard backstop. 0/unset = no cap.
      - key: DEMO_AI_DAILY_LIMIT
        value: "100"
      # room governance (demo): don't list room codes publicly (code = the key to enter),
      # expire rooms idle for 2h, and cap how many rooms exist at once. The room cap also
      # bounds AI cost — only this many rooms can generate AI calls. (DEMO room is exempt
      # from TTL — it reseeds hourly anyway.)
      - key: PUBLIC_ROOM_LIST
        value: "0"
      - key: ROOM_TTL_HOURS
        value: "2"
      - key: MAX_ROOMS
        value: "8"
      # sponsor banner — public link, safe to keep here (the button points at it)
      - key: SPONSOR_URL
        value: https://buymeacoffee.com/yazelin
      - key: SPONSOR_LABEL
        value: 請我喝杯咖啡
      - key: DEMO_NOTICE
        value: 試玩版:AI 由站長 API 處理請手下留情;資料不會永久保存,想留著請用「匯出→下載畫板檔」
      # NOTE: do NOT set HTTPS — Render terminates TLS at the edge; the container serves HTTP.
      # PORT is injected by Render automatically; the server binds it on 0.0.0.0.
